services:
  - type: web
    name: field-cms-render
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: STORAGE_ROOT
        value: /var/data
    disk:
      name: field-cms-disk
      mountPath: /var/data
      sizeGB: 1
